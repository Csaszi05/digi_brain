<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DigiBrain — UI Kit</title>
  <link rel="icon" href="../../assets/favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Canvas-only chrome */
    body { margin: 0; }
    .canvas-shell { width: 100vw; height: 100vh; }
    /* When the app is rendered standalone (not inside a DCArtboard), give it the full viewport */
    .standalone .app-shell { width: 100vw; height: 100vh; }
    /* When inside a DCArtboard the artboard provides explicit width/height */
    .artboard-host .app-shell { width: 100%; height: 100%; }
    /* Avatar */
    .sb-avatar[data-mini] { font-size: 10px; }
    /* Disable scroll bouncing in artboards */
    .artboard-host { overflow: hidden; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root" data-screen-label="DigiBrain UI Kit"></div>

  <!-- Starter components (canvas + tweaks) -->
  <script type="text/babel" src="../../design-canvas.jsx"></script>
  <script type="text/babel" src="../../tweaks-panel.jsx"></script>

  <!-- App components -->
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="components/TopBar.jsx"></script>
  <script type="text/babel" src="screens/Dashboard.jsx"></script>
  <script type="text/babel" src="screens/TopicDetail.jsx"></script>
  <script type="text/babel" src="screens/TimeTracking.jsx"></script>
  <script type="text/babel" src="screens/Finance.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>

  <!-- Mount: design canvas with all 4 screens as artboards -->
  <script type="text/babel">
    const { useState } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "sidebarVariant": "standard"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Reusable artboard wrapper that scopes the app
      const Stage = ({ initialScreen, sidebarVariant }) => (
        <div className="artboard-host" style={{ width: "100%", height: "100%" }}>
          <DigiBrainApp initialScreen={initialScreen} sidebarVariant={sidebarVariant} />
        </div>
      );

      return (
        <>
          <DesignCanvas
            title="DigiBrain — Hi-fi UI Kit"
            subtitle="Self-hosted second brain · Dark mode · zinc + indigo"
          >
            <DCSection id="screens" title="Product screens" subtitle="Click any artboard to focus, ←/→ to step through">
              <DCArtboard id="dashboard" label="Dashboard" width={1440} height={960}>
                <Stage initialScreen="dashboard" sidebarVariant={tweaks.sidebarVariant} />
              </DCArtboard>
              <DCArtboard id="topic" label="Topic detail · Kanban" width={1440} height={960}>
                <Stage initialScreen="topic" sidebarVariant={tweaks.sidebarVariant} />
              </DCArtboard>
              <DCArtboard id="time" label="Time tracking" width={1440} height={960}>
                <Stage initialScreen="time" sidebarVariant={tweaks.sidebarVariant} />
              </DCArtboard>
              <DCArtboard id="finance" label="Finances" width={1440} height={960}>
                <Stage initialScreen="finance" sidebarVariant={tweaks.sidebarVariant} />
              </DCArtboard>
            </DCSection>

            <DCSection id="sidebar-states" title="Sidebar states" subtitle="Compact · Standard · Expanded">
              <DCArtboard id="sb-compact" label="Compact (64px, icons only)" width={520} height={760}>
                <div className="artboard-host" style={{ width: "100%", height: "100%" }}>
                  <DigiBrainApp initialScreen="dashboard" sidebarVariant="compact" />
                </div>
              </DCArtboard>
              <DCArtboard id="sb-standard" label="Standard (260px)" width={720} height={760}>
                <div className="artboard-host" style={{ width: "100%", height: "100%" }}>
                  <DigiBrainApp initialScreen="dashboard" sidebarVariant="standard" />
                </div>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Sidebar default">
              <TweakRadio
                label="State"
                value={tweaks.sidebarVariant}
                onChange={(v) => setTweak("sidebarVariant", v)}
                options={[
                  { value: "compact", label: "Compact" },
                  { value: "standard", label: "Standard" },
                ]}
              />
              <div style={{ fontSize: 12, color: "var(--fg3)", marginTop: 6, lineHeight: 1.4 }}>
                Click the collapse icon in any sidebar header to toggle live. This sets the initial state for new artboard renders.
              </div>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
