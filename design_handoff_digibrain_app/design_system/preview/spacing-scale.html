<!doctype html><html><head><meta charset="utf-8"><title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 60px 1fr 80px; gap: 12px; align-items: center; }
  .bar { height: 14px; background: var(--accent-soft); border: 1px solid color-mix(in oklab, var(--accent) 35%, transparent); border-radius: 3px; }
  .lbl { font: var(--type-mono); font-size: var(--text-12); color: var(--fg2); }
  .px { font: var(--type-mono); font-size: var(--text-12); color: var(--fg3); text-align: right; }
</style></head><body>
  <div class="row"><div class="lbl">space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="lbl">space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="lbl">space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="lbl">space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="lbl">space-5</div><div class="bar" style="width:20px"></div><div class="px">20px</div></div>
  <div class="row"><div class="lbl">space-6</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="lbl">space-8</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="lbl">space-10</div><div class="bar" style="width:40px"></div><div class="px">40px</div></div>
  <div class="row"><div class="lbl">space-12</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="lbl">space-16</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
</body></html>
