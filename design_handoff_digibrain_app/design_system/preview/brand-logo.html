<!doctype html><html><head><meta charset="utf-8"><title>Brand · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-app); margin: 0; padding: 24px; display: flex; align-items: center; gap: 32px; }
  .glyph { display: inline-flex; align-items: center; gap: 12px; }
  .glyph .tile { width: 40px; height: 40px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #fff; font: 700 18px/1 var(--font-sans); letter-spacing: -0.02em; }
  .word { font: 600 22px/1 var(--font-sans); letter-spacing: -0.015em; color: var(--fg1); }
  .small .tile { width: 28px; height: 28px; border-radius: 7px; font-size: 13px; }
  .small .word { font-size: 16px; }
  .light { background: #fff; padding: 14px 18px; border-radius: var(--radius-xl); border: 1px solid var(--zinc-200); }
  .light .word { color: var(--zinc-900); }
</style></head><body>
  <div class="glyph"><span class="tile">DB</span><span class="word">DigiBrain</span></div>
  <div class="glyph small"><span class="tile">DB</span><span class="word">DigiBrain</span></div>
  <div class="light glyph"><span class="tile">DB</span><span class="word">DigiBrain</span></div>
</body></html>
