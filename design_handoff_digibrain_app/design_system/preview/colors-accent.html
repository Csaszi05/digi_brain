<!doctype html><html><head><meta charset="utf-8"><title>Colors · Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .step { height: 96px; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; color: #fff; }
  .n { font: 500 var(--text-13)/1 var(--font-sans); }
  .h { font: var(--type-mono); font-size: var(--text-12); opacity: 0.85; }
  .role { font: var(--type-mini); text-transform: uppercase; letter-spacing: var(--tracking-mini); opacity: 0.85; }
</style></head><body>
  <div class="row">
    <div class="step" style="background:var(--indigo-300); color:#1e1b4b"><div class="role">subtle</div><div><div class="n">indigo-300</div><div class="h" style="color:#312e81">a5b4fc</div></div></div>
    <div class="step" style="background:var(--indigo-400)"><div class="role">hover</div><div><div class="n">indigo-400</div><div class="h">818cf8</div></div></div>
    <div class="step" style="background:var(--indigo-500); outline: 2px solid #fff3"><div class="role">accent</div><div><div class="n">indigo-500</div><div class="h">6366f1</div></div></div>
    <div class="step" style="background:var(--indigo-600)"><div class="role">press</div><div><div class="n">indigo-600</div><div class="h">4f46e5</div></div></div>
    <div class="step" style="background:var(--indigo-700)"><div class="role">deep</div><div><div class="n">indigo-700</div><div class="h">4338ca</div></div></div>
  </div>
</body></html>
