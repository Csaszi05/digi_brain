<!-- Shared base for all preview cards. Each card is its own HTML file. -->
<style>
  @import url("../colors_and_type.css");
  html, body { background: var(--bg-app); color: var(--fg1); margin: 0; }
  body { padding: 20px; font: var(--type-body); }
  .card-wrap { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .row.wrap { flex-wrap: wrap; }
  .swatch { width: 100%; height: 56px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
  .swatch.thin { height: 32px; }
  .swatch-grid { display: grid; gap: 8px; }
  .lbl { display: flex; justify-content: space-between; gap: 8px; font: var(--type-mini); color: var(--fg3); text-transform: uppercase; letter-spacing: var(--tracking-mini); }
  .lbl b { color: var(--fg1); font-weight: 500; text-transform: none; letter-spacing: 0; font-size: var(--text-13); }
  .mono { font-family: var(--font-mono); }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: var(--radius-full); border: 1px solid var(--border); font: var(--type-mini); color: var(--fg2); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
</style>
