<!doctype html><html><head><meta charset="utf-8"><title>Colors · Semantic Tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; font: var(--type-body); }
  table { width: 100%; border-collapse: collapse; font: var(--type-small); }
  td { padding: 7px 8px; border-bottom: 1px solid var(--border); }
  td.t { color: var(--fg2); font-family: var(--font-mono); font-size: var(--text-12); width: 36%; }
  td.v { color: var(--fg3); font-family: var(--font-mono); font-size: var(--text-12); width: 36%; }
  .sw { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border); display: inline-block; vertical-align: middle; margin-right: 8px; }
</style></head><body>
  <table>
    <tr><td class="t">--fg1</td><td><span class="sw" style="background:var(--fg1)"></span>Primary text</td><td class="v">zinc-50</td></tr>
    <tr><td class="t">--fg2</td><td><span class="sw" style="background:var(--fg2)"></span>Secondary text</td><td class="v">zinc-400</td></tr>
    <tr><td class="t">--fg3</td><td><span class="sw" style="background:var(--fg3)"></span>Tertiary / metadata</td><td class="v">zinc-500</td></tr>
    <tr><td class="t">--border</td><td><span class="sw" style="background:var(--border)"></span>Hairline border</td><td class="v">zinc-800</td></tr>
    <tr><td class="t">--accent</td><td><span class="sw" style="background:var(--accent)"></span>Interactive default</td><td class="v">indigo-500</td></tr>
    <tr><td class="t">--accent-soft</td><td><span class="sw" style="background:var(--accent-soft)"></span>Accent fill (12% alpha)</td><td class="v">indigo-500/12</td></tr>
  </table>
</body></html>
