<!doctype html><html><head><meta charset="utf-8"><title>Spacing · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .tile { height: 90px; background: var(--bg-elev1); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .lbl { font: var(--type-mono); font-size: var(--text-12); color: var(--fg2); }
  .px { font: var(--type-mono); font-size: var(--text-12); color: var(--fg3); }
</style></head><body>
  <div class="tile" style="border-radius: var(--radius-sm)"><div class="lbl">sm</div><div class="px">4px</div></div>
  <div class="tile" style="border-radius: var(--radius-md)"><div class="lbl">md</div><div class="px">6px</div></div>
  <div class="tile" style="border-radius: var(--radius-lg)"><div class="lbl">lg</div><div class="px">8px</div></div>
  <div class="tile" style="border-radius: var(--radius-xl)"><div class="lbl">xl</div><div class="px">12px</div></div>
  <div class="tile" style="border-radius: var(--radius-2xl)"><div class="lbl">2xl</div><div class="px">16px</div></div>
</body></html>
