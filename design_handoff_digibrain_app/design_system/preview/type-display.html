<!doctype html><html><head><meta charset="utf-8"><title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: 80px 1fr 120px; gap: 16px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border: 0; }
  .meta { font: var(--type-mono); font-size: var(--text-12); color: var(--fg3); }
</style></head><body>
  <div class="row"><div class="meta">36 / 600</div><div style="font: var(--type-display); letter-spacing: var(--tracking-display)">Display</div><div class="meta">--type-display</div></div>
  <div class="row"><div class="meta">24 / 600</div><div style="font: var(--type-h1); letter-spacing: var(--tracking-display)">Page title</div><div class="meta">--type-h1</div></div>
  <div class="row"><div class="meta">20 / 600</div><div style="font: var(--type-h2); letter-spacing: var(--tracking-tight)">Section title</div><div class="meta">--type-h2</div></div>
  <div class="row"><div class="meta">16 / 600</div><div style="font: var(--type-h3); letter-spacing: var(--tracking-tight)">Card title</div><div class="meta">--type-h3</div></div>
</body></html>
