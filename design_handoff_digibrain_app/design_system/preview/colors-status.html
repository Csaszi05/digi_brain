<!doctype html><html><head><meta charset="utf-8"><title>Colors · Status</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .swatch { padding: 14px; border-radius: var(--radius-lg); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .swatch .bar { height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; padding: 0 12px; gap: 8px; }
  .name { font: 500 var(--text-13)/1 var(--font-sans); }
  .hex { font: var(--type-mono); font-size: var(--text-12); color: var(--fg3); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
</style></head><body>
  <div class="row">
    <div class="swatch">
      <div class="bar" style="background: var(--success-soft); color: var(--success)"><span class="dot" style="background:var(--success)"></span><span style="font:500 var(--text-13)/1 var(--font-sans)">Under budget</span></div>
      <div style="display:flex; justify-content:space-between"><span class="name" style="color:var(--success)">success</span><span class="hex">emerald-400 · 34d399</span></div>
    </div>
    <div class="swatch">
      <div class="bar" style="background: var(--warn-soft); color: var(--warn)"><span class="dot" style="background:var(--warn)"></span><span style="font:500 var(--text-13)/1 var(--font-sans)">Due soon</span></div>
      <div style="display:flex; justify-content:space-between"><span class="name" style="color:var(--warn)">warn</span><span class="hex">amber-400 · fbbf24</span></div>
    </div>
    <div class="swatch">
      <div class="bar" style="background: var(--danger-soft); color: var(--danger)"><span class="dot" style="background:var(--danger)"></span><span style="font:500 var(--text-13)/1 var(--font-sans)">Over budget</span></div>
      <div style="display:flex; justify-content:space-between"><span class="name" style="color:var(--danger)">danger</span><span class="hex">rose-400 · fb7185</span></div>
    </div>
  </div>
</body></html>
